<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 9.2 - Button groups and toggle buttons</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 9.2</h1>

      <h5>Button group</h5>
      <div class="btn-group mb-4" role="group" aria-label="Basic example">
        <button type="button" class="btn btn-outline-primary">Left</button>
        <button type="button" class="btn btn-outline-primary">Middle</button>
        <button type="button" class="btn btn-outline-primary">Right</button>
      </div>

      <h5>Toggle buttons (checkboxes)</h5>
      <div class="btn-group" role="group" aria-label="Toggle buttons">
        <input type="checkbox" class="btn-check" id="btncheck1" autocomplete="off" />
        <label class="btn btn-outline-success" for="btncheck1">On</label>

        <input type="checkbox" class="btn-check" id="btncheck2" autocomplete="off" checked />
        <label class="btn btn-outline-success" for="btncheck2">Also On</label>

        <input type="checkbox" class="btn-check" id="btncheck3" autocomplete="off" />
        <label class="btn btn-outline-success" for="btncheck3">Off</label>
      </div>
    </div>
  </body>
</html>
