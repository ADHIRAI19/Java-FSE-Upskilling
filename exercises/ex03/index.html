<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 3.1 - Responsive 3/2/1 columns</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 3.1</h1>
      <p class="mb-4 text-muted">
        1 column on mobile (xs), 2 per row on tablets (md), 3 per row on desktops (lg+).
      </p>

      <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="p-3 border rounded-3 bg-light text-center">Column 1</div>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <div class="p-3 border rounded-3 bg-light text-center">Column 2</div>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <div class="p-3 border rounded-3 bg-light text-center">Column 3</div>
        </div>
      </div>
    </div>
  </body>
</html>
