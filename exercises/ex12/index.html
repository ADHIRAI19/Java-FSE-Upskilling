<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 8.1 - Registration form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 8.1 - Registration Form</h1>

      <form class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label" for="firstName">First name</label>
          <input id="firstName" class="form-control" type="text" placeholder="John" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label" for="lastName">Last name</label>
          <input id="lastName" class="form-control" type="text" placeholder="Doe" />
        </div>

        <div class="col-12">
          <label class="form-label" for="email">Email</label>
          <div class="input-group">
            <span class="input-group-text">@</span>
            <input id="email" class="form-control" type="email" placeholder="example.com" />
          </div>
        </div>

        <div class="col-12">
          <label class="form-label" for="password">Password</label>
          <input id="password" class="form-control" type="password" placeholder="Create a password" />
        </div>

        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="agree" />
            <label class="form-check-label" for="agree">
              I agree to the terms and conditions
            </label>
          </div>
        </div>

        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary">Register</button>
          <button type="reset" class="btn btn-outline-secondary">Reset</button>
        </div>
      </form>
    </div>
  </body>
</html>
