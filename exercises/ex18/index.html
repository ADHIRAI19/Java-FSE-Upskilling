<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 11.1 - Profile card</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 11.1 - Profile Card</h1>

      <div class="card" style="max-width: 420px;">
        <img
          src="https://images.unsplash.com/photo-1502685104226-ee32379fefbe?auto=format&fit=crop&w=800&q=60"
          class="card-img-top"
          alt="Profile"
        />
        <div class="card-body">
          <h5 class="card-title">Jane Doe</h5>
          <p class="card-text">Short bio goes here. This is built using card, card-body, card-title, and card-img-top.</p>
          <a href="#" class="btn btn-primary">View profile</a>
        </div>
      </div>
    </div>
  </body>
</html>
