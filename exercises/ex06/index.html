<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 4.2 - Four columns equal width (col-sm-3)</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 4.2</h1>
      <p class="text-muted">On small screens and up: 4 equal columns using <code>col-sm-3</code>.</p>

      <div class="row g-3">
        <div class="col-12 col-sm-3"><div class="p-3 border rounded-3 bg-light text-center">1</div></div>
        <div class="col-12 col-sm-3"><div class="p-3 border rounded-3 bg-light text-center">2</div></div>
        <div class="col-12 col-sm-3"><div class="p-3 border rounded-3 bg-light text-center">3</div></div>
        <div class="col-12 col-sm-3"><div class="p-3 border rounded-3 bg-light text-center">4</div></div>
      </div>
    </div>
  </body>
</html>
