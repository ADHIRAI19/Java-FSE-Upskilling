<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 7.1 - Responsive navbar with d-flex flex-column flex-md-row</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 7.1</h1>

      <nav class="border rounded-3 p-3">
        <div class="d-flex flex-column flex-md-row gap-3 align-items-md-center justify-content-md-between">
          <div class="fw-bold">MyLogo</div>

          <div class="d-flex flex-column flex-sm-row gap-2">
            <a class="btn btn-outline-primary btn-sm" href="#">Home</a>
            <a class="btn btn-outline-primary btn-sm" href="#">About</a>
            <a class="btn btn-outline-primary btn-sm" href="#">Contact</a>
          </div>

          <div class="mt-1 mt-md-0">
            <input class="form-control" type="search" placeholder="Search" />
          </div>
        </div>
      </nav>
    </div>
  </body>
</html>
