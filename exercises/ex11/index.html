<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 7.1 - Bootstrap typography utilities</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 7.1 (Typography)</h1>

      <div class="mb-4">
        <h1 class="display-1">Display-1</h1>
      </div>

      <p class="lead">Lead text uses larger font size and light weight.</p>
      <p class="text-muted mt-3">Muted text example using <code>text-muted</code>.</p>

      <p class="fw-bold">Font weight bold using <code>fw-bold</code>.</p>

      <hr class="my-4" />

      <div class="text-uppercase fw-semibold">text-uppercase</div>
      <div class="text-lowercase fw-semibold mt-2">text-lowercase</div>
      <div class="text-capitalize fw-semibold mt-2">text-capitalize</div>
    </div>
  </body>
</html>
