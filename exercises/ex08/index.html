<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 5.2 - Reorder columns with order-md-*</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 5.2</h1>
      <p class="text-muted">On md and up, middle column moves to first using order classes.</p>

      <div class="row g-3">
        <div class="col-12 col-md-4 order-md-2">
          <div class="p-3 border rounded-3 bg-light text-center">A (order-md-2)</div>
        </div>
        <div class="col-12 col-md-4 order-md-1">
          <div class="p-3 border rounded-3 bg-light text-center">B (order-md-1)</div>
        </div>
        <div class="col-12 col-md-4 order-md-3">
          <div class="p-3 border rounded-3 bg-light text-center">C (order-md-3)</div>
        </div>
      </div>
    </div>
  </body>
</html>
