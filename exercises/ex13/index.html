<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 8.2 - Login with form-floating</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 8.2 - Login</h1>

      <form class="mx-auto" style="max-width: 520px;">
        <div class="form-floating mb-3">
          <input id="floatingEmail" class="form-control" type="email" placeholder="name@example.com" />
          <label for="floatingEmail">Email address</label>
        </div>

        <div class="form-floating mb-3">
          <input id="floatingPassword" class="form-control" type="password" placeholder="Password" />
          <label for="floatingPassword">Password</label>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" value="" id="remember" />
          <label class="form-check-label" for="remember">Remember me</label>
        </div>

        <button class="btn btn-primary w-100" type="submit">Sign in</button>
      </form>
    </div>
  </body>
</html>
