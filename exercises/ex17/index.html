<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise 10.2 - nav-tabs and nav-pills</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h1 class="mb-4">Exercise 10.2</h1>

      <h5 class="mb-2">nav-tabs</h5>
      <ul class="nav nav-tabs" id="tabsTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="tab1" data-bs-toggle="tab" data-bs-target="#pane1" type="button" role="tab">Tab 1</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="tab2" data-bs-toggle="tab" data-bs-target="#pane2" type="button" role="tab">Tab 2</button>
        </li>
      </ul>
      <div class="tab-content border border-top-0 p-3" id="tabsTabContent">
        <div class="tab-pane fade show active" id="pane1" role="tabpanel">Content for Tab 1</div>
        <div class="tab-pane fade" id="pane2" role="tabpanel">Content for Tab 2</div>
      </div>

      <hr class="my-4" />

      <h5 class="mb-2">nav-pills</h5>
      <ul class="nav nav-pills" id="pillsTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="pill1" data-bs-toggle="pill" data-bs-target="#pillPane1" type="button" role="tab">Pill A</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="pill2" data-bs-toggle="pill" data-bs-target="#pillPane2" type="button" role="tab">Pill B</button>
        </li>
      </ul>
      <div class="tab-content border border-top-0 p-3">
        <div class="tab-pane fade show active" id="pillPane1" role="tabpanel">Content for Pill A</div>
        <div class="tab-pane fade" id="pillPane2" role="tabpanel">Content for Pill B</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
